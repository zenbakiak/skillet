name: Release Binaries

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_name: skillet-macos-x86_64

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_name: skillet-macos-arm64

          # Linux x86_64 (musl for Alpine compatibility)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive_name: skillet-linux-x86_64
            use_cross: true

          # Linux ARM64 (musl for Alpine compatibility)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive_name: skillet-linux-arm64
            use_cross: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          # Ensure we use Rust 1.85+ for edition2024 support
          toolchain: stable

      - name: Install cross (for Linux musl builds)
        if: matrix.use_cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binaries
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bins
          else
            cargo build --release --target ${{ matrix.target }} --bins
          fi
        shell: bash

      - name: Create archive
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          tar czf ../../../dist/${{ matrix.archive_name }}.tar.gz \
            sk \
            sk_server \
            sk_client \
            sk_http_server \
            sk_http_bench
          cd ../../..

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/*
          retention-days: 1

  publish-release:
    name: Publish Release Assets
    needs: build-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # Only publish to release if there's a tag
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sh -c '
            for file; do
              dir=$(dirname "$file")
              base=$(basename "$file")
              (cd "$dir" && sha256sum "$base" > "$base.sha256")
            done
          ' sh {} +

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
